# ============================================================
# Logging
# ============================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_BT_MESH_LOG_LEVEL_WRN=y
CONFIG_SETTINGS_LOG_LEVEL_DBG=y

# ============================================================
# Bluetooth Core
# ============================================================
CONFIG_BT=y
CONFIG_BT_HCI=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y

# ============================================================
# Bluetooth Mesh (reduced radio footprint for coexistence)
# ============================================================
CONFIG_BT_MESH=y
CONFIG_BT_MESH_RELAY=n
CONFIG_BT_MESH_PB_ADV=y
CONFIG_BT_MESH_PB_GATT=n
CONFIG_BT_MESH_GATT_PROXY=n
CONFIG_BT_MESH_CFG_CLI=y
CONFIG_BT_MESH_CFG_CLI_TIMEOUT=5000
CONFIG_BT_MESH_PROVISIONER=y
CONFIG_BT_MESH_CDB=y
CONFIG_BT_MESH_CDB_NODE_COUNT=20
CONFIG_BT_MESH_CRPL=64
CONFIG_BT_MESH_NETWORK_TRANSMIT_COUNT=2
CONFIG_BT_MESH_NETWORK_TRANSMIT_INTERVAL=20
CONFIG_BT_MESH_UNPROV_BEACON_INT=10
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_BUF_EVT_RX_COUNT=11
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_DEVICE_NAME="NRFGateway"
CONFIG_BT_MAX_CONN=2
CONFIG_BT_EXT_ADV=y
CONFIG_BT_MESH_ADV_EXT=y
CONFIG_BT_MESH_RX_SEG_MAX=8
CONFIG_BT_MESH_RX_SEG_MSG_COUNT=12
CONFIG_BT_MESH_SEG_BUFS=64
# ============================================================
# Hardware
# ============================================================
CONFIG_DK_LIBRARY=y
CONFIG_HWINFO=y

# ============================================================
# System / Stacks
# ============================================================
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_BT_MESH_ADV_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=6144

# ============================================================
# OpenThread (must match ESP32-C6 dataset)
# ============================================================
CONFIG_OPENTHREAD=y
CONFIG_OPENTHREAD_FTD=y
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_CHANNEL=11
CONFIG_OPENTHREAD_PANID=43981
CONFIG_OPENTHREAD_NETWORK_NAME="NRFGate"
CONFIG_OPENTHREAD_XPANID="de:ad:be:ef:ca:fe:ba:be"
CONFIG_OPENTHREAD_NETWORKKEY="00112233445566778899aabbccddeeff"
CONFIG_OPENTHREAD_MANUAL_START=y
CONFIG_OPENTHREAD_PLATFORM_NETIF=y

# ============================================================
# Networking / IPv6 / UDP / Sockets
# ============================================================
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_INIT_TIMEOUT=0

# ============================================================
# CoAP / JSON
# ============================================================
CONFIG_COAP=y
CONFIG_JSON_LIBRARY=y

# ============================================================
# Multiprotocol (BLE + 802.15.4 on single radio)
# ============================================================
CONFIG_MPSL=y
CONFIG_MPSL_TIMESLOT_SESSION_COUNT=1
CONFIG_BT_LL_SOFTDEVICE=y

# ============================================================
# Settings / Flash / Persistence
# ============================================================
CONFIG_FLASH=y
CONFIG_ZMS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_ZMS=y
CONFIG_BT_SETTINGS=y
CONFIG_TRUSTED_STORAGE_STORAGE_BACKEND_SETTINGS=y
CONFIG_REBOOT=y
CONFIG_NORDIC_QSPI_NOR=n
CONFIG_SPI_NOR=n

# ============================================================
# OT Shell (for debugging)
# ============================================================
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_OPENTHREAD_SHELL=y
CONFIG_SHELL_STACK_SIZE=4096

CONFIG_BT_NUS=y

CONFIG_LORA=y

# CONFIG_LORA_LOG_LEVEL_DBG=y
# CONFIG_SPI_LOG_LEVEL_DBG=y
CONFIG_SYSTEM_WORKQUEUE_PRIORITY=-10


CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
# ── Multi-hop Relay ──
CONFIG_BT_MESH_FRIEND=y
CONFIG_BT_MESH_FRIEND_LPN_COUNT=4

# ── NUS Connection Stability ──────────────────────────────────
# Default supervision timeout (~720ms) too short when gateway
# shares radio between BLE Mesh windows and Thread windows.
# Longer timeout = connection survives busy radio periods.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=24
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=40
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400