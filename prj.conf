# ============================================
# Logging
# ============================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_BT_MESH_LOG_LEVEL_WRN=y

# ============================================
# Bluetooth basics
# ============================================
CONFIG_BT=y
CONFIG_BT_HCI=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_EXT_ADV_LEGACY_SUPPORT=y

# ============================================
# Bluetooth Mesh
# ============================================
CONFIG_BT_MESH=y
CONFIG_BT_MESH_RELAY=y
CONFIG_BT_MESH_PB_ADV=y
CONFIG_BT_MESH_PB_GATT=y
CONFIG_BT_MESH_GATT_PROXY=y
CONFIG_BT_MESH_CFG_CLI=y

# Provisioner & CDB
CONFIG_BT_MESH_PROVISIONER=y
CONFIG_BT_MESH_CDB=y
CONFIG_BT_MESH_CDB_NODE_COUNT=10

# ============================================
# Settings and Flash
# ============================================
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_ZMS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_ZMS=y
CONFIG_BT_SETTINGS=y
CONFIG_REBOOT=y

# ============================================
# Trusted Storage
# ============================================
CONFIG_TRUSTED_STORAGE_STORAGE_BACKEND_SETTINGS=y

# ============================================
# Hardware
# ============================================
CONFIG_DK_LIBRARY=y
CONFIG_HWINFO=y

# ============================================
# System
# ============================================
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_BT_RX_STACK_SIZE=4096

CONFIG_BT_MESH_ADV_EXT_ACCEPT_EXT_ADV_PACKETS=y

# ============================================
# OpenThread
# ============================================
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_FTD=y
CONFIG_OPENTHREAD_CHANNEL=11
CONFIG_OPENTHREAD_PANID=43981
CONFIG_OPENTHREAD_NETWORK_NAME="NRFGate"
CONFIG_OPENTHREAD_XPANID="dead:beef:cafe:babe:dead:beef:cafe:babe"
CONFIG_OPENTHREAD_NETWORKKEY="00112233445566778899aabbccddeeff"
CONFIG_OPENTHREAD_LOG_LEVEL_INFO=y

# ============================================
# IPv6 / UDP / Sockets
# ============================================
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
# NET_SOCKETS_POSIX_NAMES removed in Zephyr 4.x – POSIX names are now default
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_INIT_TIMEOUT=0

# ============================================
# CoAP + JSON
# ============================================
CONFIG_COAP=y
CONFIG_JSON_LIBRARY=y

# ============================================
# Multiprotocol (BLE + 802.15.4)
# ============================================
CONFIG_MPSL=y
CONFIG_MPSL_TIMESLOT_SESSION_COUNT=1
