# ============================================================
# GitLab CI/CD Pipeline – NRFGate
# Target: nRF54L15-DK (nRF Connect SDK / Zephyr RTOS)
# ============================================================

image:
  name: nordicplayground/nrfconnect-sdk:v2.9-branch
  entrypoint: [""]

stages:
  - lint
  - build

variables:
  BOARD: nrf54l15dk/nrf54l15/cpuapp
  BUILD_DIR: build

# ─── Lint ────────────────────────────────────────────────────────────────────

clang-format:
  stage: lint
  image: silkeh/clang:latest
  script:
    - find src inc -name "*.c" -o -name "*.h" | xargs clang-format --dry-run --Werror
  allow_failure: true

cppcheck:
  stage: lint
  image: facthunder/cppcheck:latest
  script:
    - cppcheck
        --enable=warning,style,performance
        --error-exitcode=1
        --suppress=missingIncludeSystem
        --inline-suppr
        -I inc/
        src/
  allow_failure: true

# ─── Build ───────────────────────────────────────────────────────────────────

build:nrf54l15dk:
  stage: build
  script:
    # The nordicplayground image has the SDK pre-installed under /workdir/ncs.
    # We build the application from the repository root.
    - west build
        --board $BOARD
        --build-dir $BUILD_DIR
        --
        -DCONF_FILE=prj.conf
  artifacts:
    name: "nrfgate-$CI_COMMIT_SHORT_SHA"
    paths:
      - $BUILD_DIR/zephyr/zephyr.hex
      - $BUILD_DIR/zephyr/zephyr.elf
      - $BUILD_DIR/zephyr/zephyr.bin
      - $BUILD_DIR/zephyr/merged.hex
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
